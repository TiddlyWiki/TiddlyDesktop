[package]
name = "td-process-checker"
version = "0.1.0"
edition = "2021"

[dependencies]
wmi = "0.14"
serde = { version = "1.0", features = ["derive"] }
windows = { version = "0.59", features = [
	"Win32_Foundation",
	"Win32_Security",
	"Win32_System_Com",
	"Win32_System_Ole",
	"Win32_System_Rpc",
	"Win32_System_Wmi",
	"Win32_System_Variant",
	"Win32_UI_WindowsAndMessaging",
] }

[profile.release]
opt-level = "z"
lto = true
strip = true
