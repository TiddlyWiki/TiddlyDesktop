<!doctype html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
<title>TiddlyDesktop</title>
<style>
.td-loading-splash {
	position: fixed;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	display: flex;
	align-items: center;
	justify-content: center;
	flex-direction: column;
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
	color: #666;
	background: #fff;
	z-index: 9999;
}
.td-loading-spinner {
	width: 40px;
	height: 40px;
	border: 3px solid #eee;
	border-top-color: #888;
	border-radius: 50%;
	animation: td-spin 1s linear infinite;
	margin-bottom: 16px;
}
@keyframes td-spin {
	to { transform: rotate(360deg); }
}
</style>
</head>
<body class="tc-body td-backstage-tiddler-window">
<div class="td-loading-splash" id="td-loading-splash">
	<div class="td-loading-spinner"></div>
	<div>Loading TiddlyDesktop&hellip;</div>
</div>
</body>
</html>
